name: Auto-refresh picks

on:
  # NOTE: Cron is intentionally disabled because NBA.com blocks GitHub Actions
  # IP ranges. The Streamlit app itself runs the daily refresh automatically
  # on the first page load after 10am ET (see auto_runner.py). This workflow
  # remains for manual triggers in case GHA IPs are unblocked in the future.
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run auto refresh
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto_refresh.py
