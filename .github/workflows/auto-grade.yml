name: Auto-grade picks

on:
  # NOTE: Cron is intentionally disabled because NBA.com blocks GitHub Actions
  # IP ranges. The Streamlit app itself runs grading automatically on the first
  # page load after 2am ET (see auto_runner.py). This workflow remains for
  # manual triggers if needed.
  workflow_dispatch:

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run auto grade
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto_grade.py
